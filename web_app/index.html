<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 30px;
            font-size: 2em;
        }
        button {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .data-box {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Мой Telegram Mini App</h1>
        <p>Добро пожаловать в приложение!</p>
        
        <button onclick="getUserData()">Получить данные</button>
        <button onclick="sendToBot()">Отправить боту</button>
        
        <div class="data-box" id="dataDisplay">
            Нажми кнопку, чтобы получить данные
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Расширяем на весь экран
        tg.expand();
        
        // Получаем данные пользователя из Telegram
        const user = tg.initDataUnsafe?.user;
        
        console.log('Пользователь Telegram:', user);
        
        // Функция получения данных с сервера
        async function getUserData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                document.getElementById('dataDisplay').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                alert('Ошибка: ' + error);
            }
        }
        
        // Функция отправки данных боту
        function sendToBot() {
            if (user) {
                tg.sendData(JSON.stringify({
                    action: 'button_click',
                    user_id: user.id,
                    timestamp: Date.now()
                }));
            } else {
                alert('Нет данных пользователя');
            }
        }
        
        // Показываем приветствие с именем пользователя
        if (user) {
            document.querySelector('h1').innerHTML = `👋 Привет, ${user.first_name}!`;
        }
    </script>
</body>
</html>
