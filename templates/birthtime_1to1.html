<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Время рождения</title>
<style>
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Regular.woff2') }}") format('woff2');font-weight:400}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Bold.woff2') }}") format('woff2');font-weight:700}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#000;font-family:'Manrope',Arial,sans-serif;color:#fff}
body{display:flex;justify-content:center}
.page{width:390px;height:816px;position:relative;overflow:hidden;background:#1D141F}
.back{position:absolute;left:16px;top:16px;width:48px;height:48px;border:0;background:transparent;display:flex;align-items:center;justify-content:center;z-index:5;text-decoration:none}
.step{position:absolute;left:119px;top:26px;width:153px;height:28px;display:flex;align-items:center;justify-content:center;color:#F1F5F9;font-size:18px;font-weight:700;line-height:22.5px;z-index:5}
.header{position:absolute;left:24px;top:144px;width:342px;padding-bottom:40px;display:flex;flex-direction:column;gap:16px;align-items:center;text-align:center;z-index:2}
.title{width:311.28px;height:45px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;line-height:30px;color:white}
.subtitle-wrap{width:342px;height:52px;position:relative}
.subtitle{position:absolute;left:32px;top:0;width:277px;height:44px;display:flex;align-items:center;justify-content:center;text-align:center;color:#E1D6F7;font-size:16px;font-weight:400;line-height:20px}
.time-area{position:absolute;left:0;top:240px;width:390px;height:410px}
.picker-card{position:absolute;left:24px;top:76px;width:342px;height:224px}
.decorative-glow{position:absolute;left:0;top:0;width:342px;height:224px;background:rgba(144,0,255,.05);box-shadow:64px 64px 64px rgba(144,0,255,.05);border-radius:9999px;filter:blur(32px)}
.column{position:absolute;top:0;width:96px;display:flex;flex-direction:column;align-items:center;z-index:2}
.hours{left:54.15px}.minutes{left:191.85px}
.col-label{height:32px;padding-bottom:16px;display:flex;align-items:flex-start;justify-content:center;color:#fff;font-size:12px;font-weight:400;line-height:16px;letter-spacing:1.2px;text-transform:uppercase}
.values{width:96px;display:flex;flex-direction:column;align-items:stretch}
.value{height:56px;display:flex;align-items:center;justify-content:center;opacity:.40;color:white;font-size:24px;font-weight:500;line-height:32px;user-select:none;touch-action:none}
.value.selected{height:80px;border-radius:12px;background:rgba(87,71,187,.09);opacity:1;color:#7261DA;font-size:36px;font-weight:700;line-height:40px}
.colon{position:absolute;left:166px;top:102px;width:9.7px;height:40px;z-index:3;color:#7261DA;font-family:'Public Sans',Arial,sans-serif;font-size:36px;font-weight:700;line-height:40px;display:flex;align-items:center;justify-content:center}
.unknown-box{position:absolute;left:24px;top:357px;width:342px;height:78px;background:rgba(144,0,255,.05);border:1px solid #745DFF;border-radius:16px;z-index:2}
.unknown-label{
  position:absolute;
  left:17px;
  top:17px;
  width:308px;
  height:44px;
  display:flex;
  align-items:center;
  gap:16px;
  cursor:pointer;
}

.unknown-input{
  flex:0 0 24px;
  width:24px;
  height:24px;
  appearance:none;
  border:2px solid rgba(255,255,255,.2);
  border-radius:8px;
  background:transparent;
  position:relative;
}

.unknown-input:checked{
  border-color:#745DFF;
  background:#745DFF;
}

.unknown-input:checked:after{
  content:'';
  position:absolute;
  left:7px;
  top:3px;
  width:7px;
  height:12px;
  border:solid #fff;
  border-width:0 2px 2px 0;
  transform:rotate(45deg);
}

.unknown-text{
  width:244px;
  height:44px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.unknown-title{
  color:#fff;
  font-size:16px;
  font-weight:400;
  line-height:22px;
  white-space:nowrap;
}

.unknown-sub{
  color:#fff;
  font-size:13px;
  font-weight:400;
  line-height:18px;
  opacity:.75;
  white-space:nowrap;
}
.bottom{position:absolute;left:0;top:728px;width:390px;padding:0 24px 32px;display:flex;justify-content:center;z-index:5}.next{width:342px;height:56px;position:relative;border-radius:9999px;background:linear-gradient(90deg,#5545B8 0%,#7565DE 100%);box-shadow:0 8px 30px rgba(64,0,255,.28);display:flex;align-items:center;justify-content:center;text-decoration:none;color:white;font-size:16px;font-weight:700;line-height:24px}.next span{position:absolute;left:133.9px;top:16px;width:50.2px;text-align:center}.next svg{position:absolute;left:192.1px;top:20px}
button,a{-webkit-tap-highlight-color:transparent}
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='page-transitions.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='nav-active.css') }}">
</head>
<body>
<div class="page">
  <a href="/birthplace" class="back" aria-label="Назад"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7H16V9H3.825Z" fill="#F1F5F9"/></svg></a>
  <div class="step">3 из 5</div>
  <section class="header"><div class="title">В какое время?</div><div class="subtitle-wrap"><div class="subtitle">Точное время рождения важно для построения вашей натальной карты</div></div></section>
  <section class="time-area">
    <div class="picker-card">
      <div class="decorative-glow"></div>
      <div class="column hours" data-type="hour">
        <div class="col-label">Часы</div>
        <div class="values"><div class="value prev">11</div><div class="value selected">12</div><div class="value nextv">13</div></div>
      </div>
      <div class="colon">:</div>
      <div class="column minutes" data-type="minute">
        <div class="col-label">Минуты</div>
        <div class="values"><div class="value prev">44</div><div class="value selected">45</div><div class="value nextv">46</div></div>
      </div>
    </div>
    <div class="unknown-box">
      <label class="unknown-label">
        <input class="unknown-input" type="checkbox" name="unknown_time">
        <span class="unknown-text"><span class="unknown-title">Не знаю точное время</span><span class="unknown-sub">Будет использовано 12:00 по умолчанию</span></span>
      </label>
    </div>
  </section>
  <div class="bottom"><a href="/loading1" class="next"><span>Далее</span><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12.175 9H0V7H12.175L6.575 1.4L8 0L16 8L8 16L6.575 14.6L12.175 9Z" fill="white"/></svg></a></div>
</div>
<script>
(function(){
  const state={hour:12, minute:45};
  function pad(n){return String(n).padStart(2,'0')}
  function wrap(v,max){return (v+max)%max}
  function render(col){
    const type=col.dataset.type, max=type==='hour'?24:60, val=state[type];
    col.querySelector('.prev').textContent=type==='hour'?wrap(val-1,max):pad(wrap(val-1,max));
    col.querySelector('.selected').textContent=type==='hour'?val:pad(val);
    col.querySelector('.nextv').textContent=type==='hour'?wrap(val+1,max):pad(wrap(val+1,max));
  }
  document.querySelectorAll('.column').forEach(col=>{
    render(col); let startY=null;
    function step(delta){const type=col.dataset.type,max=type==='hour'?24:60;state[type]=wrap(state[type]+delta,max);render(col)}
    col.addEventListener('wheel',e=>{e.preventDefault();step(e.deltaY>0?1:-1)},{passive:false});
    col.addEventListener('pointerdown',e=>{startY=e.clientY;col.setPointerCapture(e.pointerId)});
    col.addEventListener('pointerup',e=>{if(startY===null)return;const dy=e.clientY-startY;if(Math.abs(dy)>18)step(dy>0?-1:1);startY=null});
    col.addEventListener('click',e=>{if(e.target.classList.contains('prev'))step(-1);if(e.target.classList.contains('nextv'))step(1)});
  });
})();
</script>
<script src="{{ url_for('static', filename='page-transitions.js') }}"></script>
<script src="{{ url_for('static', filename='nav-active.js') }}"></script>
</body>
</html>
