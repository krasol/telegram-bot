<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Мистика | {% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <a href="/today" class="nav-item {% if active == 'today' %}active{% endif %}">
                <span class="nav-icon">🔮</span>
                <span>Сегодня</span>
            </a>
            <a href="/tarot" class="nav-item {% if active == 'tarot' %}active{% endif %}">
                <span class="nav-icon">🎴</span>
                <span>Таро</span>
            </a>
            <a href="/collection" class="nav-item {% if active == 'collection' %}active{% endif %}">
                <span class="nav-icon">📚</span>
                <span>Коллекция</span>
            </a>
            <a href="/profile" class="nav-item {% if active == 'profile' %}active{% endif %}">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </a>
        </nav>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- Шапка с монетами -->
            <div class="header">
                <div class="coins-display">
                    <span class="coin-icon">🪙</span>
                    <span class="coin-count" id="coinCount">0</span>
                </div>
                <div class="date-display" id="currentDate"></div>
            </div>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/script.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
