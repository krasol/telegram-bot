*{margin:0;padding:0;box-sizing:border-box}

  width:223px;

  color:#E1D6F7;
  font-size:16px;
  font-weight:400;
  line-height:22px;
  z-index:2;
}

.options{
  position:absolute;
  left:24px;
  top:280px;
  width:342px;
  z-index:3;
}

.option{
  width:342px;
  height:56px;
  margin-bottom:12px;
  border-radius:24px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(2px);
  position:relative;
  display:block;
  cursor:pointer;
}

.option input{
  display:none;
}

.radio{
  position:absolute;
  left:17px;
  top:17.5px;
  width:20px;
  height:20px;
  border-radius:999px;
  border:2px solid rgba(255,255,255,.30);
}

.option-text{
  position:absolute;
  left:53px;
  top:16px;
  width:272px;
  color:#fff;
  font-size:15px;
  font-weight:400;
  line-height:22.5px;
}

.option:has(input:checked){
  height:56.25px;
  background:rgba(88,68,191,.10);
  border-color:#5844BF;
  box-shadow:0 0 15px -3px #5844BF;
}

.option input:checked + .radio{
  left:15px;
  top:16px;
  width:24px;
  height:24px;
  border:0;
  background:#5847BA;
}

.option input:checked + .radio:after{
  content:'';
  position:absolute;
  left:6px;
  top:6px;
  width:12px;
  height:12px;
  border-radius:999px;
  background:#fff;
}

.next{
  position:absolute;

  top:718px;
  width:342px;

  border-radius:999px;
  background:#5545B8;

  justify-content:center;

  color:#fff;
  text-decoration:none;
  font-size:16px;
  font-weight:800;
  line-height:24px;
  z-index:5;
}

.next svg{

  height:16px;
