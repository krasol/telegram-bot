<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Загрузка</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  color:#fff;
  font-family:Arial, sans-serif;
}

.screen{
  width:390px;
  height:844px;
  position:relative;
  overflow:hidden;
  background:#1D141F;
}

/* аватары */

.avatar{
  position:absolute;
  top:60px;
  width:96px;
  height:96px;
  border-radius:50%;
  border:2px solid #5847BA;
  box-shadow:0 0 20px rgba(88,71,186,.5);
  object-fit:cover;
}

.avatar.one{ left:83px; }
.avatar.two{ left:211px; }

/* круг со sparkles */

.sparkle{
  position:absolute;
  left:175px;
  top:78px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#23170F;
  border:1px solid rgba(88,71,186,.5);
  box-shadow:0 0 10px rgba(88,71,186,.4);
  display:flex;
  align-items:center;
  justify-content:center;
}

.sparkle img{
  width:20px;
  height:20px;
}

/* текст */

.title{
  position:absolute;
  top:188px;
  width:100%;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.subtitle{
  position:absolute;
  top:260px;
  width:100%;
  text-align:center;
  font-size:14px;
  opacity:.8;
}

/* задачи */

.tasks{
  position:absolute;
  top:340px;
  width:100%;
  padding:0 20px;
}

.task{
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(0,0,0,.25);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  opacity:.4;
  transition:.3s;
}

.task.active{
  opacity:1;
}

.task.done{
  opacity:1;
}

.task-icon{
  width:26px;
  height:26px;
  border-radius:6px;
  border:2px solid rgba(255,255,255,0.25); /* серый контур */
  background:transparent; /* без заливки */
  display:flex;
  align-items:center;
  justify-content:center;
}

.task.done .task-icon{
  background:#5847BA;
}

.task-icon img{
  width:16px;
  display:none;
}

.task.done img{
  display:block;
}

/* loader */

.loader{
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,.3);
  border-top:2px solid #5847BA;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

.task.active:not(.done) .loader{
  display:block;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.task-text{
  font-size:16px;
  line-height:20px;
}

/* футер */

.finish-text{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:.6;
}
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='page-transitions.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='nav-active.css') }}">
</head>

<body>

<div class="screen">

  <img class="avatar one" src="{{ url_for('static', filename='img/main_profile.png') }}" data-inactive-src="{{ url_for('static', filename='img/main_profile.png') }}" data-active-src="{{ url_for('static', filename='img/main_profile_active.png') }}">
  <img class="avatar two" src="{{ url_for('static', filename='img/main_profile.png') }}" data-inactive-src="{{ url_for('static', filename='img/main_profile.png') }}" data-active-src="{{ url_for('static', filename='img/main_profile_active.png') }}">

  <div class="sparkle">
    <img src="{{ url_for('static', filename='img/sparkls4.png') }}">
  </div>

  <div class="title">
    Анализируем вашу<br>совместимость
  </div>

  <div class="subtitle">
    Считываем астрологию<br>и динамику отношений
  </div>

  <div class="tasks">

    <div class="task" id="task1">
      <div class="task-icon">
        <img src="{{ url_for('static', filename='img/check2.png') }}">
        <div class="loader"></div>
      </div>
      <div class="task-text">✨ Сопоставляем<br>натальные данные</div>
    </div>

    <div class="task" id="task2">
      <div class="task-icon">
        <img src="{{ url_for('static', filename='img/check2.png') }}">
        <div class="loader"></div>
      </div>
      <div class="task-text">💫 Анализируем<br>эмоции</div>
    </div>

    <div class="task" id="task3">
      <div class="task-icon">
        <img src="{{ url_for('static', filename='img/check2.png') }}">
        <div class="loader"></div>
      </div>
      <div class="task-text">🔮 Определяем<br>зоны роста</div>
    </div>

    <div class="task" id="task4">
      <div class="task-icon">
        <img src="{{ url_for('static', filename='img/check2.png') }}">
        <div class="loader"></div>
      </div>
      <div class="task-text">⭐ Даём<br>рекомендации</div>
    </div>

  </div>



</div>

<script>
const tasks = [
  document.getElementById('task1'),
  document.getElementById('task2'),
  document.getElementById('task3'),
  document.getElementById('task4')
];

const totalTime = 30000; // 30 секунд
const stepTime = totalTime / tasks.length;

function activateTask(el){
  el.classList.add('active');
}

function completeTask(el){
  el.classList.add('done');
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runAnimation(){
  for(let i = 0; i < tasks.length; i++){
    activateTask(tasks[i]);
    await wait(stepTime);
    completeTask(tasks[i]);
  }

  // пауза перед переходом
  await wait(800);

  window.location.href = "/result";
}

runAnimation();
</script>

<script src="{{ url_for('static', filename='page-transitions.js') }}"></script>
<script src="{{ url_for('static', filename='nav-active.js') }}"></script>
</body>
</html>
