<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки</title>
<style>
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Regular.woff2') }}") format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Bold.woff2') }}") format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-ExtraBold.woff2') }}") format('woff2');font-weight:800;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#000;color:#fff;display:flex;justify-content:center;font-family:'Manrope','Liberation Sans',Arial,sans-serif}
a,button{font:inherit;color:inherit;text-decoration:none}button{border:0;background:none;cursor:pointer}.phone{width:390px;min-height:1076px;position:relative;background:#141021;overflow:hidden}.topbar{position:absolute;left:0;top:0;width:390px;height:65px}.back{position:absolute;left:16px;top:16px;width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#F1F5F9;font-size:28px;line-height:48px}.title{position:absolute;left:118px;top:26px;width:153px;height:28px;text-align:center;color:#F1F5F9;font-family:'Liberation Sans','Manrope',Arial,sans-serif;font-size:18px;font-weight:700;line-height:22.5px}.content{position:absolute;left:0;top:65px;width:390px;height:1042px;overflow:hidden}.group{position:absolute;left:0;width:390px;padding-left:16px;padding-right:16px;display:flex;flex-direction:column;gap:8px}.notifications{top:0;padding-top:24px;padding-bottom:8px}.app-settings{top:230px;padding-top:16px;padding-bottom:8px}.section-title{align-self:stretch;opacity:.5;color:#fff;font-size:14px;font-weight:700;text-transform:uppercase;line-height:20px;letter-spacing:.7px}.card{width:358px;background:#1A162E;border-radius:12px;outline:1px solid #1A0F1A;outline-offset:-1px;overflow:hidden;display:flex;flex-direction:column}.card.legal{position:absolute;left:17px;top:520px;width:356px;height:114px;background:#19152D}.card.account{position:absolute;left:17px;top:681px;width:356px;background:#19152D}.row{min-height:56px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1A0F1A}.row:last-child{border-bottom:0}.app-settings .row{padding-top:15.5px;padding-bottom:15.5px}.left{display:flex;align-items:center;gap:12px}.icon{width:22px;height:22px;object-fit:contain;filter:brightness(0) invert(1)}.icon.small{width:18px;height:18px}.icon.bell{width:16px;height:20px}.item-title{color:white;font-size:16px;font-weight:500;line-height:24px}.right{display:flex;align-items:center;gap:8px;color:#9C9C9C;font-family:'Liberation Sans','Manrope',Arial,sans-serif;font-size:14px;font-weight:400;line-height:20px}.chev{width:5px;height:7px;display:block}.external{width:11px;height:11px}.switch{width:51px;height:31px;padding:2px;border-radius:999px;background:#837C98;display:flex;align-items:center;justify-content:flex-start}.switch.active{background:#5643BC;justify-content:flex-end}.knob{width:27px;height:27px;border-radius:999px;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.10),0 4px 6px rgba(0,0,0,.10)}.legal-title{position:absolute;left:16px;top:468px;width:220px;opacity:.5;color:#fff;font-size:14px;font-weight:700;text-transform:uppercase;line-height:20px;letter-spacing:.7px}.account-title{position:absolute;left:16px;top:650px;width:100px;opacity:.5;color:#fff;font-size:14px;font-weight:700;text-transform:uppercase;line-height:20px;letter-spacing:.7px}.logout-block{position:absolute;left:0;top:784px;width:390px;height:162px}.logout-btn{position:absolute;left:16px;top:32px;width:358px;height:58px;border-radius:12px;background:#5545B8;outline:1px solid #7261DA;outline-offset:-1px;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;font-size:16px;font-weight:800;line-height:24px}.version{position:absolute;left:0;top:106px;width:390px;text-align:center;color:#1A0F1A;font-family:'Public Sans','Manrope',Arial,sans-serif;font-size:12px;font-weight:400;line-height:16px}.bottom-decoration{position:absolute;left:0;top:1008px;width:390px;height:68px}.home-indicator{position:absolute;left:131px;top:32px;width:128px;height:4px;border-radius:999px;background:#5545B8}.row.legal-row{height:56px;padding:15.5px 16px}.row.account-row{padding:15.5px 16px;justify-content:flex-start}.row.account-row .left{gap:12px}
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='page-transitions.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='nav-active.css') }}">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="/profile" class="back" aria-label="Назад">‹</a>
    <div class="title">Настройки</div>
  </div>

  <main class="content">
    <section class="group notifications">
      <div class="section-title">Уведомления</div>
      <div class="card">
        <div class="row">
          <div class="left">
            <img src="{{ url_for('static', filename='img/bell.png') }}" class="icon bell" alt="">
            <div class="item-title">Общие уведомления</div>
          </div>
          <div class="switch"><div class="knob"></div></div>
        </div>
        <div class="row">
          <div class="left">
            <img src="{{ url_for('static', filename='img/tarot.png') }}" class="icon" alt="">
            <div class="item-title">Карта дня</div>
          </div>
          <div class="switch"><div class="knob"></div></div>
        </div>
        <div class="row">
          <div class="left">
            <img src="{{ url_for('static', filename='img/sparkles.png') }}" class="icon" alt="">
            <div class="item-title">Гороскоп</div>
          </div>
          <div class="switch"><div class="knob"></div></div>
        </div>
      </div>
    </section>

    <section class="group app-settings">
      <div class="section-title">Приложение</div>
      <div class="card">
        <a class="row" href="#">
          <div class="left">
            <img src="{{ url_for('static', filename='img/lang.png') }}" class="icon" alt="">
            <div class="item-title">Язык</div>
          </div>
          <div class="right">Русский <svg class="chev" viewBox="0 0 5 7"><path fill="#fff" d="M2.68 3.5 0 .82.82 0l3.5 3.5L.82 7 0 6.18 2.68 3.5Z"/></svg></div>
        </a>
        <a class="row" href="#">
          <div class="left">
            <img src="{{ url_for('static', filename='img/help.png') }}" class="icon" alt="">
            <div class="item-title">Помощь и поддержка</div>
          </div>
          <svg class="chev" viewBox="0 0 5 7"><path fill="#fff" d="M2.68 3.5 0 .82.82 0l3.5 3.5L.82 7 0 6.18 2.68 3.5Z"/></svg>
        </a>
        <a class="row" href="#">
          <div class="left">
            <img src="{{ url_for('static', filename='img/faq.png') }}" class="icon" alt="">
            <div class="item-title">FAQ</div>
          </div>
          <svg class="chev" viewBox="0 0 5 7"><path fill="#fff" d="M2.68 3.5 0 .82.82 0l3.5 3.5L.82 7 0 6.18 2.68 3.5Z"/></svg>
        </a>
      </div>
    </section>

    <div class="legal-title">Юридическая информация</div>
    <section class="card legal">
      <a class="row legal-row" href="#">
        <div class="item-title">Политика конфиденциальности</div>
        <svg class="external" viewBox="0 0 11 11"><path fill="#fff" d="M1.17 10.5c-.32 0-.6-.11-.83-.34A1.13 1.13 0 0 1 0 9.33V1.17C0 .85.11.57.34.34.57.11.85 0 1.17 0H5.25v1.17H1.17v8.16h8.16V5.25h1.17v4.08c0 .32-.11.6-.34.83-.23.23-.5.34-.83.34H1.17Zm2.74-3.09-.82-.82 5.43-5.42h-2.1V0h4.08v4.08H9.33v-2.1L3.91 7.42Z"/></svg>
      </a>
      <a class="row legal-row" href="#">
        <div class="item-title">Условия использования</div>
        <svg class="external" viewBox="0 0 11 11"><path fill="#fff" d="M1.17 10.5c-.32 0-.6-.11-.83-.34A1.13 1.13 0 0 1 0 9.33V1.17C0 .85.11.57.34.34.57.11.85 0 1.17 0H5.25v1.17H1.17v8.16h8.16V5.25h1.17v4.08c0 .32-.11.6-.34.83-.23.23-.5.34-.83.34H1.17Zm2.74-3.09-.82-.82 5.43-5.42h-2.1V0h4.08v4.08H9.33v-2.1L3.91 7.42Z"/></svg>
      </a>
    </section>

    <div class="account-title">Аккаунт</div>
    <section class="card account">
      <button class="row account-row" type="button">
        <div class="left">
          <img src="{{ url_for('static', filename='img/restore.png') }}" class="icon small" alt="">
          <div class="item-title">Восстановить покупки</div>
        </div>
      </button>
      <button class="row account-row" type="button">
        <div class="left">
          <img src="{{ url_for('static', filename='img/user.png') }}" class="icon" alt="">
          <div class="item-title">Управление аккаунтом</div>
        </div>
      </button>
    </section>

    <section class="logout-block">
      <button class="logout-btn" type="button">
        <img src="{{ url_for('static', filename='img/logout.png') }}" class="icon small" alt="">
        <span>Выйти</span>
      </button>
      <div class="version">Версия 1.4.2 (Build 240)</div>
    </section>
  </main>

  <div class="bottom-decoration"><div class="home-indicator"></div></div>
</div>
<script src="{{ url_for('static', filename='page-transitions.js') }}"></script>
<script src="{{ url_for('static', filename='nav-active.js') }}"></script>
</body>
</html>
