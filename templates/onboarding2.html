<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Онбординг 2</title>

<style>
@font-face{
  font-family:'Manrope';
  src:url("{{ url_for('static', filename='fonts/Manrope-Regular.woff2') }}") format('woff2');
  font-weight:400;
}
@font-face{
  font-family:'Manrope';
  src:url("{{ url_for('static', filename='fonts/Manrope-Bold.woff2') }}") format('woff2');
  font-weight:700;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  display:flex;
  justify-content:center;
  font-family:'Manrope',Arial,sans-serif;
  color:#fff;
}

.onboarding{
  width:390px;
  height:939px;
  position:relative;
  background:#1E1420;
}

/* TOP */
.back{
  position:absolute;
  left:16px;
  top:16px;
  font-size:20px;
  text-decoration:none;
  color:#fff;
}

.nav-title{
  position:absolute;
  top:28px;
  width:100%;
  text-align:center;
  font-weight:700;
}

/* PROGRESS */
.progress{
  position:absolute;
  top:72px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:8px;
}

.progress div{
  width:40px;
  height:6px;
  border-radius:999px;
  background:rgba(85,69,184,.2);
}

.progress .active{
  width:54px;
  background:#5545B8;
}

/* HERO */
.hero{
  position:absolute;
  top:126px;
  width:100%;
}

.hero-card{
  margin:0 auto;
  width:342px;
  height:320px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(85,69,184,.1);
  position:relative;
}

/* ВОТ ТУТ ГЛАВНОЕ */
.hero-image{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TITLE */
.title{
  position:absolute;
  top:470px;
  width:100%;
  text-align:center;
  font-size:28px;
  font-weight:700;
  line-height:34px;
}

.desc{
  position:absolute;
  top:540px;
  width:100%;
  text-align:center;
  font-size:16px;
  color:#ddd;
  line-height:24px;
}

/* FEATURES */
.feature{
  width:330px;
  margin:12px auto;
  padding:16px;
  border-radius:14px;
  background:rgba(85,69,184,.08);
  display:flex;
  gap:12px;
  align-items:center;
}

.feature img{
  width:22px;
}

/* BUTTON */
.btn{
  position:absolute;
  bottom:40px;
  left:24px;
  width:342px;
  height:56px;
  background:#5545B8;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:700;
  text-decoration:none;
  color:#fff;
}
</style>
</head>

<body>

<div class="onboarding">

<a href="/onboarding/1" class="back">←</a>
<div class="nav-title">Ежедневные ритуалы</div>

<div class="progress">
  <div></div>
  <div class="active"></div>
  <div></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-card">
    <img class="hero-image"
         src="{{ url_for('static', filename='img/onboarding2.png') }}">
  </div>
</div>

<!-- TEXT -->
<div class="title">
  Раскрой ответы<br>через карты
</div>

<div class="desc">
  Получай карту дня, делай расклады<br>
  и сохраняй инсайты
</div>

<!-- FEATURES -->
<div style="position:absolute; top:620px; width:100%">

  <div class="feature">
    <img src="{{ url_for('static', filename='img/card-day.png') }}">
    <div>
      <b>Карта дня</b><br>
      <span style="font-size:12px;color:#aaa">Ежедневное послание</span>
    </div>
  </div>

  <div class="feature">
    <img src="{{ url_for('static', filename='img/spreads.png') }}">
    <div>
      <b>Расклады</b><br>
      <span style="font-size:12px;color:#aaa">Практики и ответы</span>
    </div>
  </div>

</div>

<!-- BUTTON -->
<a href="/onboarding/3" class="btn">
  Продолжить
  <img src="{{ url_for('static', filename='img/arrow-right.png') }}">
</a>

</div>

</body>
</html>
