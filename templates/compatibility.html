<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131020">
<title>Расклад на любовь</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/compatibility.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='page-transitions.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='nav-active.css') }}">
</head>
<body>

<div class="page compatibility-page">
  <div class="blur-purple"></div>
  <div class="blur-orange"></div>

  <header class="topbar">
    <a class="back" href="/quiz5" aria-label="Назад">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7H16V9H3.825Z" fill="#F1F5F9"/>
      </svg>
    </a>
    <div class="step">Почти готово</div>
  </header>

  <main class="content">
    <section class="hero">
      <h1>Расклад на<br>любовь</h1>
      <p>Карты помогут понять скрытые чувства,<br>эмоциональную связь и возможное будущее<br>ваших отношений.</p>

      <div class="card-wrap" aria-hidden="true">
        <img src="{{ url_for('static', filename='img/love-spread-card.jpg') }}" alt="">
      </div>
    </section>

    <section class="spread-list" aria-label="Темы расклада">
      <button class="spread-item is-active" type="button">
        <span class="dot"><span></span></span>
        <span>Чувства</span>
      </button>

      <button class="spread-item" type="button">
        <span class="dot"><span></span></span>
        <span>Истинные намерения</span>
      </button>

      <button class="spread-item" type="button">
        <span class="dot"><span></span></span>
        <span>Будущее</span>
      </button>
    </section>

    <a class="start-btn" href="/loading" aria-label="Начать расклад">
      <span>Начать расклад</span>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M17.5 8.5L16.25 5.75L13.5 4.5L16.25 3.25L17.5 .5L18.75 3.25L21.5 4.5L18.75 5.75L17.5 8.5ZM17.5 22.5L16.25 19.75L13.5 18.5L16.25 17.25L17.5 14.5L18.75 17.25L21.5 18.5L18.75 19.75L17.5 22.5ZM7.5 19.5L5 14L-.5 11.5L5 9L7.5 3.5L10 9L15.5 11.5L10 14L7.5 19.5Z" fill="#FFF3FD"/>
      </svg>
    </a>
  </main>

  <div class="bottom-mark" aria-hidden="true">
    <svg width="36" height="17" viewBox="0 0 36 17" fill="none">
      <path d="M8.25 16.5C5.95 16.5 4 15.7 2.4 14.1C.8 12.5 0 10.55 0 8.25C0 5.95 .8 4 2.4 2.4C4 .8 5.95 0 8.25 0C9.175 0 10.062 .16 10.913 .49C11.763 .81 12.525 1.27 13.2 1.88L15.75 4.2L13.5 6.22L11.175 4.12C10.775 3.78 10.325 3.5 9.825 3.3C9.325 3.1 8.8 3 8.25 3C6.8 3 5.562 3.51 4.537 4.54C3.512 5.56 3 6.8 3 8.25C3 9.7 3.512 10.94 4.537 11.96C5.562 12.99 6.8 13.5 8.25 13.5C8.8 13.5 9.325 13.4 9.825 13.2C10.325 13 10.775 12.73 11.175 12.38L22.8 1.88C23.475 1.27 24.237 .81 25.087 .49C25.938 .16 26.825 0 27.75 0C30.05 0 32 .8 33.6 2.4C35.2 4 36 5.95 36 8.25C36 10.55 35.2 12.5 33.6 14.1C32 15.7 30.05 16.5 27.75 16.5C26.825 16.5 25.938 16.34 25.087 16.01C24.237 15.69 23.475 15.23 22.8 14.62L20.25 12.3L22.5 10.27L24.825 12.38C25.225 12.73 25.675 13 26.175 13.2C26.675 13.4 27.2 13.5 27.75 13.5C29.2 13.5 30.438 12.99 31.462 11.96C32.487 10.94 33 9.7 33 8.25C33 6.8 32.487 5.56 31.462 4.54C30.438 3.51 29.2 3 27.75 3C27.2 3 26.675 3.1 26.175 3.3C25.675 3.5 25.225 3.78 24.825 4.12L13.2 14.62C12.525 15.23 11.763 15.69 10.913 16.01C10.062 16.34 9.175 16.5 8.25 16.5Z" fill="#6155F5"/>
    </svg>
    <span></span>
  </div>
</div>

<script src="{{ url_for('static', filename='js/compatibility.js') }}"></script>
<script src="{{ url_for('static', filename='page-transitions.js') }}"></script>
<script src="{{ url_for('static', filename='nav-active.js') }}"></script>
</body>
</html>
