<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка совместимости</title>

<style>
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Regular.woff2') }}") format('woff2');font-weight:400}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Bold.woff2') }}") format('woff2');font-weight:700}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-ExtraBold.woff2') }}") format('woff2');font-weight:800}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  font-family:'Manrope','Liberation Sans',Arial,sans-serif;
}

.page{
  width:390px;
  height:804px;
  position:relative;
  overflow:hidden;
  background:#131020;
}

/* BACKGROUND */
.blur-purple{
  position:absolute;
  width:289px;
  height:393px;
  left:-57px;
  top:49px;
  background:rgba(145,0,255,.10);
  border-radius:9999px;
  filter:blur(74px);
}

.blur-orange{
  position:absolute;
  width:234px;
  height:354px;
  left:195px;
  top:354px;
  background:rgba(255,106,0,.05);
  border-radius:9999px;
  filter:blur(60px);
}

/* HEADER */
.back{
  position:absolute;
  left:16px;
  top:16px;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  z-index:5;
}

.back img{
  width:16px;
  height:16px;
  object-fit:contain;
}

.step{
  position:absolute;
  left:118px;
  top:26px;
  width:153px;
  height:28px;
  text-align:center;
  color:#F1F5F9;
  font-family:'Liberation Sans','Manrope',Arial,sans-serif;
  font-size:18px;
  font-weight:700;
  line-height:22.5px;
}

/* MAIN */
.main{
  position:absolute;
  left:0;
  top:125px;
  width:390px;
  height:634px;
  overflow:hidden;
}

.title{
  position:absolute;
  left:55px;
  top:0;
  width:280px;
  text-align:center;
  color:#fff;
  font-size:30px;
  font-weight:700;
  line-height:34px;
}

.subtitle{
  position:absolute;
  left:69px;
  top:86px;
  width:252px;
  text-align:center;
  color:#E1D6F7;
  font-size:16px;
  font-weight:400;
  line-height:20px;
}

/* AVATARS */
.avatars{
  position:absolute;
  left:24px;
  top:124px;
  width:342px;
  height:112px;
}

.avatar-item{
  position:absolute;
  top:16px;
  width:80px;
  height:80px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,253,252,.40);
  box-shadow:0 0 20px rgba(85,69,184,.15);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.avatar-item.one{left:51px}
.avatar-item.two{left:211px}

.avatar-item img{
  width:20px;
  height:20px;
  object-fit:contain;
}

.badge{
  position:absolute;
  right:-4px;
  bottom:-4px;
  width:24px;
  height:24px;
  border-radius:999px;
  background:#5545B8;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:10px;
  font-weight:700;
  line-height:15px;
  font-family:'Public Sans','Manrope',sans-serif;
}

.divider{
  position:absolute;
  left:155px;
  top:55px;
  width:32px;
  height:1px;
  background:rgba(85,69,184,.30);
}

/* INPUTS */
.inputs{
  position:absolute;
  left:24px;
  top:266px;
  width:342px;
  height:196px;
}

.input-card{
  position:absolute;
  left:0;
  width:342px;
  height:90px;
  background:#271937;
  border:1px solid #745DFF;
  border-radius:12px;
  backdrop-filter:blur(6px);
}

.input-card.first{top:0}
.input-card.second{top:106px}

.input-inner{
  position:absolute;
  left:17px;
  top:17px;
  width:308px;
  height:56px;
}

.input-inner label{
  display:block;
  color:#FBE3DA;
  font-size:12px;
  font-weight:700;
  line-height:16px;
  letter-spacing:.3px;
  text-transform:uppercase;
  margin-bottom:7px;
}

.input-inner input{
  width:100%;
  height:32px;
  border:0;
  outline:0;
  background:transparent;
  color:#fff;
  font-size:18px;
  font-weight:400;
}

.input-inner input::placeholder{
  color:rgba(255,255,255,.20);
}

/* DECOR */
.decor{
  position:absolute;
  left:24px;
  top:492px;
  width:342px;
  height:71px;
  opacity:.30;
}

.decor img{
  position:absolute;
  left:143px;
  top:-11px;
  width:55px;
  height:55px;
  object-fit:contain;
}

/* BUTTON */
.next{
  position:absolute;
  left:24px;
  top:718px;
  width:342px;
  height:56px;
  border-radius:999px;
  background:#5545B8;
  box-shadow:0 8px 30px rgba(64,0,255,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:#fff;
  text-decoration:none;
  font-size:16px;
  font-weight:800;
  line-height:24px;
}

.next img{
  width:16px;
  height:16px;
  object-fit:contain;
}
</style>
</head>

<body>
<div class="page">

  <div class="blur-purple"></div>
  <div class="blur-orange"></div>

  <a href="/profile" class="back">
    <img src="{{ url_for('static', filename='img/back.png') }}" alt="">
  </a>

  <div class="step">1 из 7</div>

  <main class="main">

    <div class="title">Кто участвует в проверке?</div>

    <div class="subtitle">
      Имена используются для<br>
      персонализации анализа
    </div>

    <section class="avatars">
      <div class="avatar-item one">
        <img src="{{ url_for('static', filename='img/user-purple.png') }}" alt="">
        <div class="badge">1</div>
      </div>

      <div class="divider"></div>

      <div class="avatar-item two">
        <img src="{{ url_for('static', filename='img/user-purple.png') }}" alt="">
        <div class="badge">2</div>
      </div>
    </section>

    <section class="inputs">
      <div class="input-card first">
        <div class="input-inner">
          <label>Ваше имя</label>
          <input type="text" placeholder="Введите ваше имя">
        </div>
      </div>

      <div class="input-card second">
        <div class="input-inner">
          <label>Имя партнера</label>
          <input type="text" placeholder="Введите имя партнера">
        </div>
      </div>
    </section>

    <div class="decor">
      <img src="{{ url_for('static', filename='img/sparkles-white.png') }}" alt="">
    </div>

  </main>

  <a href="/match2" class="next">
    Далее
    <img src="{{ url_for('static', filename='img/arrow-right-white.png') }}" alt="">
  </a>

</div>
</body>
</html>
