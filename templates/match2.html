<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дата рождения</title>

<style>
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Regular.woff2') }}") format('woff2');font-weight:400}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-Bold.woff2') }}") format('woff2');font-weight:700}
@font-face{font-family:'Manrope';src:url("{{ url_for('static', filename='fonts/Manrope-ExtraBold.woff2') }}") format('woff2');font-weight:800}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  font-family:'Manrope','Liberation Sans',Arial,sans-serif;
}

.page{
  width:390px;
  height:900px;
  position:relative;
  overflow:hidden;
  background:#131020;
}

/* BACKGROUND */
.blur-purple{
  position:absolute;
  width:289px;
  height:393px;
  left:-57px;
  top:49px;
  background:rgba(145,0,255,.10);
  border-radius:9999px;
  filter:blur(74px);
}

.cosmic-top{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 141% 141% at 100% 0%,rgba(49,46,129,.10) 0%,rgba(49,46,129,0) 50%);
}

.cosmic-bottom{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 141% 141% at 0% 100%,rgba(88,28,135,.10) 0%,rgba(88,28,135,0) 50%);
}

/* HEADER */
.back{
  position:absolute;
  left:16px;
  top:16px;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  z-index:5;
}

.back img{
  width:16px;
  height:16px;
  object-fit:contain;
}

.step{
  position:absolute;
  left:118px;
  top:26px;
  width:153px;
  height:28px;
  text-align:center;
  color:#F1F5F9;
  font-family:'Liberation Sans','Manrope',Arial,sans-serif;
  font-size:18px;
  font-weight:700;
  line-height:22.5px;
  z-index:5;
}

/* TITLE */
.heading{
  position:absolute;
  left:24px;
  top:118px;
  width:343px;
  color:#F1F5F9;
  font-size:25px;
  font-weight:700;
  line-height:35px;
  z-index:2;
}

/* CARDS AREA */
.cards{
  position:absolute;
  left:0;
  top:177px;
  width:390px;
  height:637px;
  z-index:2;
}

.person-card{
  position:absolute;
  left:16px;
  width:358px;
  height:263px;
  border-radius:16px;
  background:#271937;
  border:1px solid #745DFF;
  overflow:hidden;
  backdrop-filter:blur(6px);
  box-shadow:0 4px 6px -4px rgba(0,0,0,.10),0 10px 15px -3px rgba(0,0,0,.10);
}

.person-card.first{top:0}
.person-card.second{top:287px}

.person-head{
  position:absolute;
  left:21px;
  top:21px;
  width:316px;
  height:28px;
  display:flex;
  align-items:center;
  gap:8px;
}

.person-head img{
  width:16px;
  height:16px;
  object-fit:contain;
}

.person-name{
  color:#fff;
  font-size:20px;
  font-weight:700;
  line-height:28px;
}

/* FORM */
.form{
  position:absolute;
  left:21px;
  top:69px;
  width:316px;
  height:173px;
}

.field{
  position:absolute;
}

.field.date{
  left:0;
  top:0;
  width:316px;
}

.field.time{
  left:0;
  top:93px;
  width:152px;
}

.field.place{
  left:164px;
  top:93px;
  width:152px;
}

label{
  display:block;
  color:#fff;
  font-size:14px;
  font-weight:400;
  line-height:20px;
  margin-left:4px;
  margin-bottom:6px;
}

.input{
  position:relative;
  height:51px;
  border-radius:12px;
  background:rgba(0,0,0,.20);
  border:1px solid rgba(255,255,255,.10);
  overflow:hidden;
}

.input img{
  position:absolute;
  left:12px;
  top:14px;
  width:20px;
  height:20px;
  object-fit:contain;
  opacity:.2;
}

.field.date .input img{
  width:18px;
  height:23px;
  top:14px;
}

.field.place .input img{
  width:16px;
  height:23px;
  top:14px;
}

.input input{
  position:absolute;
  left:45px;
  top:0;
  width:calc(100% - 55px);
  height:51px;
  border:0;
  outline:0;
  background:transparent;
  color:#fff;
  font-size:16px;
}

.input input::placeholder{
  color:rgba(255,255,255,.20);
}

/* HELPER */
.helper{
  position:absolute;
  left:16px;
  top:569px;
  width:358px;
  height:46px;
  text-align:center;
  color:#E1D6F7;
  font-size:16px;
  font-weight:400;
  line-height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BUTTON */
.next{
  position:absolute;
  left:23px;
  top:814px;
  width:342px;
  height:56px;
  border-radius:999px;
  background:#5545B8;
  box-shadow:0 8px 30px rgba(64,0,255,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:#fff;
  text-decoration:none;
  font-size:16px;
  font-weight:800;
  line-height:24px;
  z-index:5;
}

.next img{
  width:16px;
  height:16px;
  object-fit:contain;
}
</style>
</head>

<body>
<div class="page">

  <div class="blur-purple"></div>
  <div class="cosmic-top"></div>
  <div class="cosmic-bottom"></div>

  <a href="/match" class="back">
    <img src="{{ url_for('static', filename='img/back.png') }}" alt="">
  </a>

  <div class="step">2 из 7</div>

  <div class="heading">Введите дату рождения</div>

  <main class="cards">

    <!-- PERSON 1 -->
    <section class="person-card first">
      <div class="person-head">
        <img src="{{ url_for('static', filename='img/male.png') }}" alt="">
        <div class="person-name">Александр</div>
      </div>

      <div class="form">
        <div class="field date">
          <label>Дата рождения</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/calendar.png') }}" alt="">
            <input placeholder="ДД.ММ.ГГГГ">
          </div>
        </div>

        <div class="field time">
          <label>Время (необяз.)</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/clock.png') }}" alt="">
            <input placeholder="ЧЧ:ММ">
          </div>
        </div>

        <div class="field place">
          <label>Место</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/location.png') }}" alt="">
            <input placeholder="Город">
          </div>
        </div>
      </div>
    </section>

    <!-- PERSON 2 -->
    <section class="person-card second">
      <div class="person-head">
        <img src="{{ url_for('static', filename='img/female.png') }}" alt="">
        <div class="person-name">Мария</div>
      </div>

      <div class="form">
        <div class="field date">
          <label>Дата рождения</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/calendar.png') }}" alt="">
            <input placeholder="ДД.ММ.ГГГГ">
          </div>
        </div>

        <div class="field time">
          <label>Время (необяз.)</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/clock.png') }}" alt="">
            <input placeholder="ЧЧ:ММ">
          </div>
        </div>

        <div class="field place">
          <label>Место</label>
          <div class="input">
            <img src="{{ url_for('static', filename='img/location.png') }}" alt="">
            <input placeholder="Город">
          </div>
        </div>
      </div>
    </section>

    <div class="helper">
      Чем точнее данные, тем точнее<br>
      анализ совместимости
    </div>

  </main>

  <a href="/quiz1" class="next">
    Далее
    <img src="{{ url_for('static', filename='img/arrow-right-white.png') }}" alt="">
  </a>

</div>
</body>
</html>
