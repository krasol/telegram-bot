<script>
const input = document.querySelector('.search-input');
document.querySelectorAll('.city-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ input.value = btn.dataset.city || ''; });
});
document.getElementById('locationBtn').addEventListener('click',()=>{
  if(!navigator.geolocation){ input.value = 'Геолокация недоступна'; return; }
  input.value = 'Определяем местоположение...';
  navigator.geolocation.getCurrentPosition(
    ()=>{ input.value = 'Моё местоположение'; },
    ()=>{ input.value = 'Не удалось определить'; },
    {enableHighAccuracy:true, timeout:6000}
  );
});
</script>
